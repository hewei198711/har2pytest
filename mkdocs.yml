site_name: har2pytest
site_description: 从HAR文件、Swagger接口文档自动生成API接口文件和pytest+allure测试用例
site_url: https://hewei198711.github.io/har2pytest
repo_url: https://github.com/hewei198711/har2pytest

theme:
  name: material
  language: zh
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.sections
    - toc.integrate

nav:
  - 首页: index.md
  - API 文件生成: api_file_generation.md
  - HAR 文件解析: har_file_parsing.md
  - Swagger 文档解析: swagger_document_parsing.md
  - 测试用例生成模式: testcase_generation_modes.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

extra:
  generator: false