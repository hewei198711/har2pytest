name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Create minimal config for CI
        run: |
          cat > har2pytest_config.json << 'EOF'
          {
            "BASE_URLS": ["https://api.example.com"],
            "KILL_URLS": ["aliyuncs.com"],
            "SERVICE_MAPPING": {"api": "example_service"},
            "SWAGGER_DOC_URLS": {"example_service": "https://example.com/swagger"},
            "DEFAULT_API_DIR": "apis",
            "TESTCASE_DIR": "testcases"
          }
          EOF

      - name: Run tests
        run: |
          python -m pytest tests/ -v --cov=har2pytest --cov-report=term